name: chapter02-tests

on:
  push:
    paths:
      - "chapter02/**"
      - ".github/workflows/chapter02.yml"
      - "requirements.txt"
      - "pyproject.toml"
  pull_request:
    paths:
      - "chapter02/**"
      - ".github/workflows/chapter02.yml"
      - "requirements.txt"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run startup tests
        run: pytest chapter02/test_bench.py --mode startup
      - name: Run solution tests
        run: |
          pytest chapter02/test_bench.py --mode solution
          pytest chapter02/test_solution_model.py
